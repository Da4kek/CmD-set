name: Build Android APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Step 1: Build benchlog ARM64 binary ────────────────────────────────
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true
          cache-dependency-path: benchlog/go.sum

      - name: Build benchlog for Android (linux/arm64 static)
        run: |
          mkdir -p benchlog-android/app/src/main/jniLibs/arm64-v8a
          cd benchlog
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 \
            go build -ldflags="-s -w" \
            -o ../benchlog-android/app/src/main/jniLibs/arm64-v8a/libbenchlog.so .

      # ── Step 2: Get static BusyBox ARM64 from official Docker image ────────
      - name: Set up QEMU (for ARM64 image extraction)
        uses: docker/setup-qemu-action@v3

      - name: Extract BusyBox ARM64 static binary (Alpine = musl, statically linked)
        run: |
          id=$(docker create --platform linux/arm64 alpine:latest)
          docker cp "$id:/bin/busybox" \
            benchlog-android/app/src/main/jniLibs/arm64-v8a/libbusybox.so
          docker rm "$id"
          file benchlog-android/app/src/main/jniLibs/arm64-v8a/libbusybox.so

      # ── Step 3: Build the APK ─────────────────────────────────────────────
      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.4"

      - name: Generate Gradle wrapper and build APK
        run: |
          cd benchlog-android
          gradle wrapper --gradle-version=8.4
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Verify .so files are in APK
        run: |
          APK=benchlog-android/app/build/outputs/apk/debug/app-debug.apk
          echo "=== lib/ entries in APK ==="
          unzip -l "$APK" | grep "lib/" || echo "WARNING: no lib/ entries found in APK"
          echo "=== file types ==="
          unzip -p "$APK" lib/arm64-v8a/libbusybox.so > /tmp/bb.bin 2>/dev/null && file /tmp/bb.bin || echo "WARNING: libbusybox.so not extractable"
          unzip -p "$APK" lib/arm64-v8a/libbenchlog.so > /tmp/bl.bin 2>/dev/null && file /tmp/bl.bin || echo "WARNING: libbenchlog.so not extractable"

      # ── Step 4: Upload APK to GitHub Release ──────────────────────────────
      - name: Upload APK to release
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          cp benchlog-android/app/build/outputs/apk/debug/app-debug.apk \
             "benchlog-android-${VERSION}.apk"
          gh release upload "$GITHUB_REF_NAME" \
            "benchlog-android-${VERSION}.apk" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
