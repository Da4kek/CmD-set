name: Build Android APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Step 1: Build benchlog ARM64 binary ────────────────────────────────
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true
          cache-dependency-path: benchlog/go.sum

      - name: Build benchlog for Android (android/arm64 static)
        run: |
          mkdir -p benchlog-android/app/src/main/jniLibs/arm64-v8a
          cd benchlog
          GOOS=android GOARCH=arm64 CGO_ENABLED=0 \
            go build -ldflags="-s -w" \
            -o ../benchlog-android/app/src/main/jniLibs/arm64-v8a/libbenchlog.so .
          file ../benchlog-android/app/src/main/jniLibs/arm64-v8a/libbenchlog.so

      # ── Step 2: Build the APK ─────────────────────────────────────────────
      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.4"

      - name: Generate Gradle wrapper and build APK
        run: |
          cd benchlog-android
          gradle wrapper --gradle-version=8.4
          chmod +x gradlew
          ./gradlew assembleDebug

      # ── Step 3: Verify APK contents ───────────────────────────────────────
      - name: Verify .so files in APK
        run: |
          APK=benchlog-android/app/build/outputs/apk/debug/app-debug.apk
          echo "=== lib/ entries in APK ==="
          unzip -l "$APK" | grep "lib/" || echo "WARNING: no lib/ entries"
          echo "=== libbenchlog.so file type ==="
          unzip -p "$APK" lib/arm64-v8a/libbenchlog.so > /tmp/bl.bin 2>/dev/null \
            && file /tmp/bl.bin \
            || echo "WARNING: libbenchlog.so not extractable from APK"

      # ── Step 4: Upload APK to GitHub Release ──────────────────────────────
      - name: Upload APK to release
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          cp benchlog-android/app/build/outputs/apk/debug/app-debug.apk \
             "benchlog-android-${VERSION}.apk"
          gh release upload "$GITHUB_REF_NAME" \
            "benchlog-android-${VERSION}.apk" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
