name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: benchlog
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
          cache-dependency-path: benchlog/go.sum

      - name: Install NSIS
        run: sudo apt-get install -y nsis
        working-directory: .

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
          workdir: benchlog
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Windows installer
        run: |
          VERSION=${GITHUB_REF_NAME#v}

          # Build benchlog.exe for Windows
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 \
            go build -ldflags="-s -w" -o benchlog.exe .

          # Download BusyBox for Windows (static binary, no install needed)
          curl -fsSL "https://frippery.org/files/busybox/busybox64.exe" -o busybox64.exe

          # Build installer (bundles both binaries + creates shell launcher)
          makensis -DVERSION=$VERSION installer.nsi
          gh release upload $GITHUB_REF_NAME "benchlog-${VERSION}-setup.exe" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
